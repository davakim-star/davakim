<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduTrack — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="app-root"></div>
<script src="layout.js"></script>
<script>
buildLayout('teacher');
document.getElementById('page-main').innerHTML = `
<div class="page-header">
  <div class="header-left"><h1>👤 My Profile</h1><p class="subtitle">Manage your personal information</p></div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="toggleEdit()">✏️ Edit Profile</button>
    <button class="btn btn-primary" onclick="saveProfile()">💾 Save Changes</button>
  </div>
</div>

<div class="card" style="margin-bottom:20px;overflow:visible;">
  <div class="profile-banner"></div>
  <div class="profile-info-section">
    <div class="profile-avatar-wrap">
      <div class="avatar avatar-xl avatar-red" style="border:4px solid white;box-shadow:0 4px 16px rgba(0,0,0,0.1);font-size:24px;">MJL</div>
    </div>
    <div style="padding-bottom:4px;">
      <div style="font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;">Mrs. Maydelyn Joy Laudato</div>
      <div style="font-size:13px;color:#6C757D;">Faculty — College of Information Technology</div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
        <span class="badge badge-primary">👩‍🏫 Teacher</span>
        <span class="badge badge-success">✅ Active</span>
        <span class="badge badge-info">3 Classes</span>
      </div>
    </div>
    <div style="margin-left:auto;display:flex;gap:20px;text-align:center;padding-bottom:8px;">
      <div><div style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;">90</div><div style="font-size:12px;color:#6C757D;">Students</div></div>
      <div><div style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;">3</div><div style="font-size:12px;color:#6C757D;">Classes</div></div>
      <div><div style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;">94%</div><div style="font-size:12px;color:#6C757D;">Avg Attendance</div></div>
    </div>
  </div>
</div>

<div class="two-col-equal">
  <div class="card">
    <div class="card-header"><span class="card-title">Personal Information</span></div>
    <div class="card-body">
      <div class="form-group"><label class="form-label">First Name</label><input class="form-control" value="Maydelyn Joy" id="fname"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" value="Laudato" id="lname"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" value="mjlaudato@school.edu.ph"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" value="+63 912 345 6789"></div>
      <div class="form-group"><label class="form-label">Department</label><input class="form-control" value="College of Information Technology"></div>
      <div class="form-group"><label class="form-label">Employee ID</label><input class="form-control" value="TCH-2019-0042" disabled style="background:#F8F9FA;"></div>
    </div>
  </div>

  <div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header"><span class="card-title">Change Password</span></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-control" placeholder="••••••••"></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-control" placeholder="••••••••"></div>
        <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-control" placeholder="••••••••"></div>
        <button class="btn btn-primary" style="width:100%;" onclick="showToast('Password updated!','success')">Update Password</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Notification Settings</span></div>
      <div class="card-body">
        ${[
          ['Email notifications','Receive grade submission alerts',true],
          ['SMS alerts','Receive SMS for urgent messages',false],
          ['Message notifications','Get notified for new messages',true],
          ['Weekly summary','Receive weekly class summary',true],
        ].map(([title,desc,on])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F3F5;">
          <div><div style="font-size:13.5px;font-weight:600;">${title}</div><div style="font-size:12px;color:#6C757D;">${desc}</div></div>
          <label style="position:relative;display:inline-block;width:38px;height:22px;cursor:pointer;">
            <input type="checkbox" ${on?'checked':''} style="opacity:0;width:0;height:0;" onchange="showToast('Setting updated','success')">
            <span style="position:absolute;inset:0;background:${on?'#8B1A1A':'#CED4DA'};border-radius:22px;transition:0.2s;"></span>
            <span style="position:absolute;top:3px;left:${on?'19px':'3px'};width:16px;height:16px;background:white;border-radius:50%;transition:0.2s;"></span>
          </label>
        </div>`).join('')}
      </div>
    </div>
  </div>
</div>
`;

function toggleEdit() { showToast('Edit mode enabled','default'); }
function saveProfile() { showToast('Profile saved successfully!','success'); }
</script>
<script src="app.js"></script>
</body>
</html>
